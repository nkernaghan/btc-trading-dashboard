services:
  - type: web
    name: btc-dashboard-api
    runtime: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_MEMORY_CACHE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.3"
    autoDeploy: true

  - type: web
    name: btc-dashboard-frontend
    runtime: node
    region: ohio
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: btc-dashboard-api
          type: web
          property: host
      - key: NODE_VERSION
        value: "20.11.0"
    autoDeploy: true
