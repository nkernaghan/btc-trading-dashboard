services:
  - type: web
    name: btc-dashboard-api
    runtime: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_MEMORY_CACHE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.3"
    autoDeploy: true
